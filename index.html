<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Euclid Viewer</title>

<style>
    body {
        margin: 0;
        background: black;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    #container {
        position: relative;
        display: inline-block;
    }

    #mainVideo {
        width: 1000px;
        max-width: 95vw;
        display: block;
    }

    #clickGrid {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;

        height: 70px;

        display: grid;
        grid-template-columns: repeat(48, 1fr);
    }

    .cell {
        cursor: pointer;
    }

    .cell:hover {
        background: rgba(255,255,255,0.15);
    }
</style>
</head>

<body>

<div id="container">

    <video
        id="mainVideo"
        autoplay
        muted
        loop
        playsinline>
        <source src="1_5.webm" type="video/webm">
    </video>

    <div id="clickGrid"></div>

</div>

<script>
    const grid = document.getElementById("clickGrid");
    const video = document.getElementById("mainVideo");

    for (let i = 1; i <= 48; i++) {
        const cell = document.createElement("div");
        cell.className = "cell";

        cell.addEventListener("click", () => {
            video.src = i + "_5.webm";
            video.load();
            video.play();
        });

        grid.appendChild(cell);
    }
</script>

</body>
</html>
