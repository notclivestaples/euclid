<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Euclid Viewer</title>

<style>
    body {
        margin: 0;
        background: black;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    #container {
        position: relative;
        display: inline-block;
    }

    #display {
        width: 1000px;
        max-width: 95vw;
        display: block;
    }

    #clickGrid {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;

        height: 70px;

        display: grid;
        grid-template-columns: repeat(49, 1fr);
    }

    .cell {
        cursor: pointer;
    }

    .cell:hover {
        background: rgba(255,255,255,0.15);
    }
</style>
</head>

<body>

<div id="container">

    <img id="display" src="blank.png" alt="Default Display">

    <div id="clickGrid"></div>

</div>

<script>
    const grid = document.getElementById("clickGrid");
    const container = document.getElementById("container");

    function showBlank() {
        const current = document.getElementById("display");

        const img = document.createElement("img");
        img.id = "display";
        img.src = "blank.png";
        img.alt = "Default Display";
        img.style.width = "1000px";
        img.style.maxWidth = "95vw";
        img.style.display = "block";

        current.replaceWith(img);
    }

    function showVideo(num) {
        const current = document.getElementById("display");

        const video = document.createElement("video");
        video.id = "display";
        video.autoplay = true;
        video.muted = true;
        video.loop = true;
        video.playsInline = true;
        video.style.width = "1000px";
        video.style.maxWidth = "95vw";
        video.style.display = "block";

        const source = document.createElement("source");
        source.src = num + "_5.webm";
        source.type = "video/webm";

        video.appendChild(source);

        current.replaceWith(video);

        video.play();
    }

    for (let i = 0; i <= 48; i++) {
        const cell = document.createElement("div");
        cell.className = "cell";

        cell.addEventListener("click", () => {
            if (i === 0) {
                showBlank();
            } else {
                showVideo(i);
            }
        });

        grid.appendChild(cell);
    }
</script>

</body>
</html>
